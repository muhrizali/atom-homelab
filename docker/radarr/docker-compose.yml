---
services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - /home/atomic/.config/radarr:/config
      - /media/storage/COLLECTIONS/media:/media
    ports:
      - 7878:7878
    restart: unless-stopped

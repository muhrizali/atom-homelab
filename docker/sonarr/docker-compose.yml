---
services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - /home/atomic/.config/sonarr:/config
      - /media/storage/COLLECTIONS/media:/media
    ports:
      - 8989:8989
    restart: unless-stopped
